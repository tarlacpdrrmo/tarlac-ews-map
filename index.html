<!DOCTYPE html>
<html>
<head>
    <title>Tarlac EWS Monitoring Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; cursor: default; }
        #map { height: 100vh; width: 100vw; background: #f3f4f6; } 

        /* --- Top Control Pill (Theme Switch & Title) --- */
        .control-panel {
            position: absolute;
            top: 15px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(15, 23, 42, 0.75); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 20px; 
            border-radius: 40px; 
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .panel-title {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #f8fafc;
            border-right: 1px solid rgba(255,255,255,0.2);
            padding-right: 15px;
            line-height: 1.3;
            text-align: right;
            white-space: normal;
        }

        /* iOS-Style Theme Switch */
        .switch-container { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .switch-label { font-size: 9px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
        .switch { position: relative; display: inline-block; width: 32px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.15); transition: .3s ease; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px; background-color: #94a3b8; transition: .3s ease; border-radius: 50%; }
        input:checked + .slider { background-color: rgba(255, 255, 255, 0.3); border-color: rgba(255, 255, 255, 0.5); }
        input:checked + .slider:before { transform: translateX(14px); background-color: #ffffff; }

        /* --- Network Health Dashboard --- */
        .health-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 200px;
        }

        .health-panel h3 {
            margin: 0 0 12px 0;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
        }

        .health-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .health-stat:last-child { margin-bottom: 0; border-bottom: none; padding-bottom: 0; }

        .stat-label { font-size: 10px; font-weight: 600; color: #cbd5e1; display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px; }
        .stat-value { font-size: 14px; font-weight: 800; color: #f8fafc; }

        /* Indicator Dots */
        .indicator-dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 4px rgba(0,0,0,0.5); }
        .dot-up { background: #10b981; }      
        .dot-down { background: #ef4444; }    
        .dot-maint { background: #f59e0b; }   
        .dot-reloc { background: #8b5cf6; }   
        .dot-fews { font-size: 14px; line-height: 1; margin-right: -4px; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5)); } 

        /* --- Custom Map Markers --- */
        .custom-leaflet-icon { background: none; border: none; }
        
        .map-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 2px solid #ffffff;
            color: #ffffff;
            box-shadow: 0 3px 8px rgba(0,0,0,0.5);
            transition: transform 0.2s ease;
        }
        
        .map-marker:hover { transform: scale(1.15); z-index: 1000 !important; }

        /* Pulse Animation for FEWS Sirens */
        @keyframes pulse-fews {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
            70% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .marker-fews { animation: pulse-fews 2s infinite; }

        /* Leaflet Controls */
        .leaflet-control-zoom { border: none !important; box-shadow: 0 4px 10px rgba(0,0,0,0.5) !important; opacity: 0.8; margin-top: 15px !important; margin-left: 15px !important; }
        .leaflet-control-zoom a { width: 26px !important; height: 26px !important; line-height: 26px !important; font-size: 14px !important; background-color: rgba(15, 23, 42, 0.85) !important; color: #cbd5e1 !important; border-color: rgba(255,255,255,0.1) !important; backdrop-filter: blur(4px); }
        .leaflet-control-zoom a:hover { background-color: rgba(30, 41, 59, 0.95) !important; color: white !important; }

        /* Popup Styling */
        .leaflet-popup-content-wrapper { border-radius: 8px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); font-family: 'Inter', sans-serif; }
        .leaflet-popup-content { margin: 14px; color: #1f2937; }
        
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="panel-title">
            Community Based Flood Early<br>Warning Monitoring System
        </div>
        <div class="switch-container">
            <span class="switch-label">Dark</span>
            <label class="switch">
                <input type="checkbox" id="themeToggleCheckbox" checked>
                <span class="slider"></span>
            </label>
            <span class="switch-label">Light</span>
        </div>
    </div>

    <div class="health-panel">
        <h3>Network Health <span id="statTotal" style="color: #38bdf8;">0 Total</span></h3>
        
        <div class="health-stat">
            <div class="stat-label"><div class="indicator-dot dot-up"></div> ACTIVE (UP)</div>
            <div class="stat-value" id="statUp">0</div>
        </div>
        <div class="health-stat">
            <div class="stat-label"><div class="indicator-dot dot-down"></div> OFFLINE (DOWN)</div>
            <div class="stat-value" id="statDown">0</div>
        </div>
        <div class="health-stat">
            <div class="stat-label"><div class="indicator-dot dot-maint"></div> MAINTENANCE</div>
            <div class="stat-value" id="statMaint">0</div>
        </div>
        <div class="health-stat">
            <div class="stat-label"><div class="indicator-dot dot-reloc"></div> RELOCATION</div>
            <div class="stat-value" id="statReloc">0</div>
        </div>
        <div class="health-stat" style="margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px;">
            <div class="stat-label"><span class="dot-fews">🚨</span> FEWS SIRENS</div>
            <div class="stat-value" id="statFews" style="color: #cbd5e1;">0</div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        var map = L.map('map', { zoomControl: false }).setView([15.48, 120.59], 10);
        L.control.zoom({ position: 'topleft' }).addTo(map);

        // Basemap Layers
        var darkBasemap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap', maxZoom: 19 });
        var lightBasemap = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap', maxZoom: 19 });

        // Set default basemap to Light mode
        var currentBasemap = lightBasemap;
        currentBasemap.addTo(map);

        // Theme Switch Logic
        document.getElementById('themeToggleCheckbox').addEventListener('change', function(e) {
            map.removeLayer(currentBasemap);
            if (e.target.checked) {
                currentBasemap = lightBasemap;
            } else {
                currentBasemap = darkBasemap;
            }
            currentBasemap.addTo(map);
            currentBasemap.bringToBack(); 
        });

        var ewsMarkers = L.featureGroup().addTo(map);

        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-3_dPrWSR7GQ9AKKIFJ9YRbbUHyJjx4_mWTwVuuqQ68oQhUN_yz4hqP2nreUu-U8eM5_grye4lefD/pub?output=csv'; 

        // Network Health Colors
        function getColor(status) {
            if (!status) return '#475569'; 
            var s = status.toUpperCase();
            if (s.includes('UP')) return '#10b981';       // Emerald Green
            if (s.includes('DOWN')) return '#ef4444';     // Red
            if (s.includes('RELOCATION')) return '#8b5cf6'; // Purple
            if (s.includes('MAINTENANCE')) return '#f59e0b'; // Amber
            return '#3b82f6'; // Fallback Blue
        }

        // Live Polling Setup
        fetchData();
        setInterval(fetchData, 60000); // Silent refresh every 60 seconds

        function fetchData() {
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    ewsMarkers.clearLayers();
                    var counts = { total: 0, up: 0, down: 0, maint: 0, reloc: 0, fews: 0 };

                    results.data.forEach(function(row) {
                        var lat = parseFloat(row['LATITUDE']);
                        var lng = parseFloat(row['LONGITUDE']); 
                        
                        if (!isNaN(lat) && !isNaN(lng)) {
                            
                            counts.total++;
                            var rawStatus = (row['Status'] || "").toUpperCase();
                            var deviceType = row['DEVICE TYPE'] ? row['DEVICE TYPE'].toUpperCase() : "";
                            var statusColor = getColor(row['Status']);
                            
                            if (rawStatus.includes('UP')) counts.up++;
                            else if (rawStatus.includes('DOWN')) counts.down++;
                            else if (rawStatus.includes('MAINTENANCE')) counts.maint++;
                            else if (rawStatus.includes('RELOCATION')) counts.reloc++;

                            if (deviceType.includes('FEWS')) counts.fews++;

                            var metricsHtml = "";
                            if (deviceType.includes('WLMS') && row['WATER_LEVEL_M']) {
                                metricsHtml += `<b>Water Level:</b> <span style="color:#0284c7; font-weight:800;">${row['WATER_LEVEL_M']} m</span><br>`;
                            }
                            if (deviceType.includes('ARG') && row['RAINFALL_MM']) {
                                metricsHtml += `<b>Rainfall:</b> <span style="color:#0ea5e9; font-weight:800;">${row['RAINFALL_MM']} mm</span><br>`;
                            }

                            // Device Icon Logic
                            var isFews = deviceType.includes('FEWS');
                            var iconHtml = "";
                            
                            if (isFews) {
                                // EXACT MATCH: Unified Red Siren Emoji for FEWS
                                iconHtml = `<div style="font-size: 16px; line-height: 1; margin-top: -1px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));">🚨</div>`;
                            } else {
                                // WLMS, ARG, TANDEM all use a unified telemetry instrument icon
                                iconHtml = `<i class="fa-solid fa-satellite-dish" style="font-size: 12px;"></i>`;
                            }

                            // Dynamic size and pulse based on whether it is a siren
                            var markerSize = isFews ? 30 : 26;
                            var pulseClass = isFews ? 'marker-fews' : '';

                            var customIcon = L.divIcon({
                                html: `
                                    <div class="map-marker ${pulseClass}" style="background-color: ${statusColor}; width: ${markerSize}px; height: ${markerSize}px;">
                                        ${iconHtml}
                                    </div>
                                `,
                                className: 'custom-leaflet-icon',
                                iconSize: [markerSize, markerSize],
                                iconAnchor: [markerSize / 2, markerSize / 2]
                            });

                            var marker = L.marker([lat, lng], { icon: customIcon });

                            marker.bindPopup(`
                                <div style="line-height:1.6; min-width: 180px;">
                                    <strong style="font-size:11px; text-transform:uppercase; color:#0f172a; display:block; margin-bottom:6px; border-bottom:2px solid #e2e8f0; padding-bottom:4px;">
                                        ${row['LIST OF INSTRUMENT']}
                                    </strong>
                                    <div style="font-size:12px; color:#334155;">
                                        <span style="color:#64748b; font-size:10px; text-transform:uppercase; font-weight:700;">Type:</span> ${row['DEVICE TYPE']}<br>
                                        <span style="color:#64748b; font-size:10px; text-transform:uppercase; font-weight:700;">Status:</span> <span style="font-weight:700; color:${statusColor}">${row['Status']}</span><br>
                                        ${metricsHtml}
                                    </div>
                                    <div style="margin-top:8px; font-size:9px; color:#94a3b8; text-align:right;">
                                        Updated: ${row['UPDATE:']}
                                    </div>
                                </div>
                            `).addTo(ewsMarkers);
                        }
                    });

                    // Update Health Tally
                    document.getElementById('statTotal').innerText = `${counts.total} Total`;
                    document.getElementById('statUp').innerText = counts.up;
                    document.getElementById('statDown').innerText = counts.down;
                    document.getElementById('statMaint').innerText = counts.maint;
                    document.getElementById('statReloc').innerText = counts.reloc;
                    document.getElementById('statFews').innerText = counts.fews;

                    // Only zoom to fit bounds on the very first load
                    if (ewsMarkers.getLayers().length > 0 && !window.initialZoomDone) {
                        map.fitBounds(ewsMarkers.getBounds(), { padding: [50, 50] });
                        window.initialZoomDone = true;
                    }
                }
            });
        }
    </script>
</body>
</html>
