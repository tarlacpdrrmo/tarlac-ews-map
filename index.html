<!DOCTYPE html>
<html>
<head>
    <title>Tarlac EWS Monitoring Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        #map { height: 100vh; width: 100%; background: #ffffff; }
        body { margin: 0; padding: 0; font-family: sans-serif; }
        
        /* Legend Styles */
        .legend {
            padding: 10px;
            background: white;
            line-height: 1.5em;
            border: 2px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
        .legend i {
            width: 15px; height: 15px;
            float: left; margin-right: 8px;
            opacity: 0.9; border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map');
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 1. Tarlac Boundary
        fetch('https://raw.githubusercontent.com/faeldon/philippines-json-maps/master/2023/geojson/provinces/lowres/tarlac.geojson')
            .then(res => res.json())
            .then(geojsonData => {
                var boundary = L.geoJSON(geojsonData, {
                    style: { color: "#2c3e50", weight: 3, fillOpacity: 0 }
                }).addTo(map);
                map.fitBounds(boundary.getBounds(), { padding: [30, 30] });
            });

        // 2. Data Link
        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-3_dPrWSR7GQ9AKKIFJ9YRbbUHyJjx4_mWTwVuuqQ68oQhUN_yz4hqP2nreUu-U8eM5_grye4lefD/pub?output=csv'; 

        function getColor(status) {
            var s = status ? status.toUpperCase() : '';
            if (s.includes('UP')) return '#2e7d32';
            if (s.includes('DOWN')) return '#c62828';
            if (s.includes('RELOCATION')) return '#6a1b9a';
            if (s.includes('MAINTENANCE')) return '#ef6c00';
            return '#7f8c8d';
        }

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                results.data.forEach(function(row) {
                    var lat = parseFloat(row['LATITUDE']);
                    var lng = parseFloat(row['LONGTITUDE']);
                    
                    if (!isNaN(lat) && !isNaN(lng)) {
                        var marker = L.circleMarker([lat, lng], {
                            radius: 10,
                            fillColor: getColor(row['Status']),
                            color: "#fff",
                            weight: 2,
                            fillOpacity: 0.9
                        }).addTo(map);

                        // Dynamic Popup based on Device Type
                        var measurement = "";
                        if (row['DEVICE TYPE'] === 'WLMS') {
                            measurement = `<b>Water Level:</b> ${row['WATER_LEVEL'] || '0'} m<br>`;
                        } else if (row['DEVICE TYPE'] === 'ARG') {
                            measurement = `<b>Rainfall:</b> ${row['RAINFALL'] || '0'} mm<br>`;
                        }

                        marker.bindPopup(`
                            <div style="font-size:13px;">
                                <strong>${row['LIST OF INSTRUMENT']}</strong><br>
                                <hr>
                                <b>Status:</b> ${row['Status']}<br>
                                ${measurement}
                                <b>Last Update:</b> ${row['UPDATE:']}
                            </div>
                        `);
                    }
                });
            }
        });

        // 3. Add the Legend
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<b>EWS Status</b><br>';
            div.innerHTML += '<i style="background: #2e7d32"></i> UP<br>';
            div.innerHTML += '<i style="background: #c62828"></i> DOWN<br>';
            div.innerHTML += '<i style="background: #ef6c00"></i> MAINTENANCE<br>';
            div.innerHTML += '<i style="background: #6a1b9a"></i> RELOCATION<br>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
