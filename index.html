<!DOCTYPE html>
<html>
<head>
    <title>Tarlac EWS Monitoring Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; cursor: default; }
        #map { height: 100vh; width: 100vw; background: #f3f4f6; } 

        /* --- Top Control Pill --- */
        .control-panel {
            position: absolute;
            top: 15px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(15, 23, 42, 0.75); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 20px; 
            border-radius: 40px; 
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .panel-title {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #f8fafc;
            border-right: 1px solid rgba(255,255,255,0.2);
            padding-right: 15px;
            line-height: 1.3;
            text-align: right;
            white-space: normal;
        }

        /* Sensor Filter Dropdown */
        .filter-container {
            border-right: 1px solid rgba(255,255,255,0.2);
            padding-right: 15px;
            display: flex;
            align-items: center;
        }

        .filter-container select {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #f8fafc;
            padding: 6px 14px;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
            appearance: none; 
            -webkit-appearance: none;
            padding-right: 30px;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23ffffff%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 12px top 50%;
            background-size: 8px auto;
        }

        .filter-container select:hover, .filter-container select:focus {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: #38bdf8;
        }
        .filter-container select option { background: #1e293b; color: white; }

        /* iOS-Style Theme Switch */
        .switch-container { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .switch-label { font-size: 9px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
        .switch { position: relative; display: inline-block; width: 32px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.15); transition: .3s ease; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px; background-color: #94a3b8; transition: .3s ease; border-radius: 50%; }
        input:checked + .slider { background-color: rgba(255, 255, 255, 0.3); border-color: rgba(255, 255, 255, 0.5); }
        input:checked + .slider:before { transform: translateX(14px); background-color: #ffffff; }

        /* --- Network Health Dashboard --- */
        .health-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 200px;
        }

        .health-panel h3 { margin: 0 0 12px 0; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; font-weight: 700; display: flex; justify-content: space-between; }
        .health-stat { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .health-stat:last-child { margin-bottom: 0; border-bottom: none; padding-bottom: 0; }
        .stat-label { font-size: 10px; font-weight: 600; color: #cbd5e1; display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px; }
        .stat-value { font-size: 14px; font-weight: 800; color: #f8fafc; }

        .indicator-dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 4px rgba(0,0,0,0.5); }
        .dot-up { background: #10b981; }      
        .dot-down { background: #ef4444; }    
        .dot-maint { background: #f59e0b; }   
        .dot-reloc { background: #8b5cf6; }   
        .dot-fews { font-size: 14px; line-height: 1; margin-right: -4px; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5)); } 

        /* --- Custom Map Markers --- */
        .custom-leaflet-icon { background: none; border: none; }
        .map-marker { display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid #ffffff; color: #ffffff; box-shadow: 0 3px 8px rgba(0,0,0,0.5); transition: transform 0.2s ease; z-index: 1000; }
        .map-marker:hover { transform: scale(1.15); z-index: 1000 !important; }

        @keyframes pulse-fews { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); } 70% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .marker-fews { animation: pulse-fews 2s infinite; }

        /* --- NEW: Animated Water Flow Lines --- */
        .water-flow-line {
            stroke-dasharray: 12, 12;
            animation: flowAnimation 1s linear infinite;
            filter: drop-shadow(0 0 4px rgba(14, 165, 233, 0.8));
        }
        @keyframes flowAnimation {
            from { stroke-dashoffset: 24; }
            to { stroke-dashoffset: 0; }
        }

        /* Leaflet Controls */
        .leaflet-control-zoom { border: none !important; box-shadow: 0 4px 10px rgba(0,0,0,0.5) !important; opacity: 0.8; margin-top: 15px !important; margin-left: 15px !important; }
        .leaflet-control-zoom a { width: 26px !important; height: 26px !important; line-height: 26px !important; font-size: 14px !important; background-color: rgba(15, 23, 42, 0.85) !important; color: #cbd5e1 !important; border-color: rgba(255,255,255,0.1) !important; backdrop-filter: blur(4px); }
        .leaflet-control-zoom a:hover { background-color: rgba(30, 41, 59, 0.95) !important; color: white !important; }
        
        /* Popup Styling */
        .leaflet-popup-content-wrapper { border-radius: 8px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); font-family: 'Inter', sans-serif; }
        .leaflet-popup-content { margin: 14px; color: #1f2937; min-width: 250px; } 
        
        .gps-box { background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.08); padding: 4px 8px; border-radius: 6px; margin-top: 6px; margin-bottom: 6px; font-size: 9px; font-family: monospace; color: #475569; display: flex; align-items: center; gap: 6px; }

        /* --- HORIZONTAL History Log UI --- */
        .history-container { margin-top: 12px; border-top: 1px solid #e2e8f0; padding-top: 8px; }
        .history-title { font-size: 9px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
        
        .history-log { 
            display: flex; 
            flex-direction: row; 
            gap: 8px; 
            overflow-x: auto; 
            overflow-y: hidden; 
            background: #f8fafc; 
            border: 1px solid #e2e8f0; 
            border-radius: 6px; 
            padding: 8px; 
            max-width: 100%;
        }
        
        .history-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            flex: 0 0 auto; 
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            padding: 6px 10px;
            min-width: 60px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        .history-time { font-weight: 700; color: #64748b; font-size: 9px; margin-bottom: 3px; border-bottom: 1px solid #f1f5f9; padding-bottom: 3px; width: 100%; text-align: center; }
        .history-metrics { font-weight: 800; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        
        .history-log::-webkit-scrollbar { height: 6px; } 
        .history-log::-webkit-scrollbar-track { background: transparent; }
        .history-log::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .history-log::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    </style>
</head>
<body>

    <div class="control-panel">
        <div class="panel-title">
            Community Based Flood Early<br>Warning Monitoring System
        </div>
        
        <div class="filter-container">
            <select id="sensorFilter">
                <option value="ALL">All Sensors</option>
                <option value="WLMS">WLMS (Water Level)</option>
                <option value="ARG">ARG (Rain Gauge)</option>
                <option value="TANDEM">TANDEM (Combo)</option>
                <option value="FEWS">FEWS (Sirens)</option>
            </select>
        </div>

        <div class="switch-container">
            <span class="switch-label">Dark</span>
            <label class="switch">
                <input type="checkbox" id="themeToggleCheckbox" checked>
                <span class="slider"></span>
            </label>
            <span class="switch-label">Light</span>
        </div>
    </div>

    <div class="health-panel">
        <h3>Network Health <span id="statTotal" style="color: #38bdf8;">0 Total</span></h3>
        <div class="health-stat"><div class="stat-label"><div class="indicator-dot dot-up"></div> ACTIVE (UP)</div><div class="stat-value" id="statUp">0</div></div>
        <div class="health-stat"><div class="stat-label"><div class="indicator-dot dot-down"></div> OFFLINE (DOWN)</div><div class="stat-value" id="statDown">0</div></div>
        <div class="health-stat"><div class="stat-label"><div class="indicator-dot dot-maint"></div> MAINTENANCE</div><div class="stat-value" id="statMaint">0</div></div>
        <div class="health-stat"><div class="stat-label"><div class="indicator-dot dot-reloc"></div> RELOCATION</div><div class="stat-value" id="statReloc">0</div></div>
        <div class="health-stat" style="margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px;"><div class="stat-label"><span class="dot-fews">🚨</span> FEWS SIRENS</div><div class="stat-value" id="statFews" style="color: #cbd5e1;">0</div></div>
    </div>

    <div id="map"></div>

    <script>
        var map = L.map('map', { zoomControl: false }).setView([15.48, 120.59], 10);
        L.control.zoom({ position: 'topleft' }).addTo(map);

        var darkBasemap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap', maxZoom: 19 });
        var lightBasemap = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap', maxZoom: 19 });
        var currentBasemap = lightBasemap;
        currentBasemap.addTo(map);

        document.getElementById('themeToggleCheckbox').addEventListener('change', function(e) {
            map.removeLayer(currentBasemap);
            currentBasemap = e.target.checked ? lightBasemap : darkBasemap;
            currentBasemap.addTo(map);
            currentBasemap.bringToBack(); 
        });

        var ewsBuffers = L.featureGroup().addTo(map);
        var ewsFlowLines = L.featureGroup().addTo(map); // NEW: Layer for animated water flow
        var ewsMarkers = L.featureGroup().addTo(map);
        
        // ==============================================================================
        // IMPORTANT: PASTE YOUR TWO PUBLISHED CSV LINKS HERE
        // ==============================================================================
        var mainCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-3_dPrWSR7GQ9AKKIFJ9YRbbUHyJjx4_mWTwVuuqQ68oQhUN_yz4hqP2nreUu-U8eM5_grye4lefD/pub?output=csv'; 
        
        var archiveCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-3_dPrWSR7GQ9AKKIFJ9YRbbUHyJjx4_mWTwVuuqQ68oQhUN_yz4hqP2nreUu-U8eM5_grye4lefD/pub?gid=1557794138&single=true&output=csv'; 
        // ==============================================================================
        
        var allDownloadedData = [];
        var archivedHistoryMap = {}; 
        var wlmsNodesMap = []; // Stores WLMS coordinates for the flow animation

        function getColor(status) {
            if (!status) return '#475569'; 
            var s = status.toUpperCase();
            if (s.includes('UP')) return '#10b981';       
            if (s.includes('DOWN')) return '#ef4444';     
            if (s.includes('RELOCATION')) return '#8b5cf6'; 
            if (s.includes('MAINTENANCE')) return '#f59e0b'; 
            return '#3b82f6'; 
        }

        function fetchCsvData(url) {
            return new Promise((resolve) => {
                Papa.parse(url, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) { resolve(results.data); },
                    error: function() { resolve([]); } 
                });
            });
        }

        function getMetric(row, keyword1, keyword2) {
            let keys = Object.keys(row);
            let targetKey = keys.find(k => k.toUpperCase().includes(keyword1) || (keyword2 && k.toUpperCase().includes(keyword2)));
            if (targetKey && row[targetKey] && row[targetKey].trim() !== '') {
                return row[targetKey];
            }
            return null;
        }

        async function fetchAllData() {
            var [mainData, archiveData] = await Promise.all([
                fetchCsvData(mainCsvUrl),
                fetchCsvData(archiveCsvUrl)
            ]);

            allDownloadedData = mainData;
            archivedHistoryMap = {};
            var twentyFourHoursAgo = new Date().getTime() - (24 * 60 * 60 * 1000);

            for (let i = archiveData.length - 1; i >= 0; i--) {
                let row = archiveData[i];
                let keys = Object.keys(row);
                
                let timestampStr = row['TIMESTAMP'] || row[keys[keys.length - 1]]; 
                let recordDate = new Date(timestampStr);

                if (!isNaN(recordDate) && recordDate.getTime() >= twentyFourHoursAgo) {
                    let sensorName = row['LIST OF INSTRUMENT'];
                    if (!archivedHistoryMap[sensorName]) archivedHistoryMap[sensorName] = [];
                    
                    let rawWl = getMetric(row, 'WATER', 'COLUMN 6');
                    let rawRg = getMetric(row, 'RAIN', 'COLUMN 7');
                    
                    let wlVal = rawWl ? parseFloat(rawWl) : NaN;
                    let rgVal = rawRg ? parseFloat(rawRg) : NaN;

                    let metricsArray = [];
                    
                    if (!isNaN(wlVal)) {
                        metricsArray.push(`<span style="color:#0284c7;">${wlVal}m</span>`);
                    }
                    if (!isNaN(rgVal)) {
                        metricsArray.push(`<span style="color:#0ea5e9;">${rgVal}mm</span>`);
                    }
                    
                    if (metricsArray.length > 0) {
                        let timeStr = recordDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        
                        archivedHistoryMap[sensorName].push(`
                            <div class="history-item">
                                <span class="history-time">${timeStr}</span>
                                <span class="history-metrics">${metricsArray.join('')}</span>
                            </div>
                        `);
                    }
                }
            }
            renderMapData(); 
        }

        fetchAllData();
        setInterval(fetchAllData, 60000); 

        document.getElementById('sensorFilter').addEventListener('change', renderMapData);

        function renderMapData() {
            ewsMarkers.clearLayers();
            ewsBuffers.clearLayers(); 
            ewsFlowLines.clearLayers(); // Clear flows
            wlmsNodesMap = []; // Reset nodes list
            var counts = { total: 0, up: 0, down: 0, maint: 0, reloc: 0, fews: 0 };
            var activeFilter = document.getElementById('sensorFilter').value;

            allDownloadedData.forEach(function(row) {
                var lat = parseFloat(row['LATITUDE']);
                var lng = parseFloat(row['LONGITUDE']); 
                
                if (!isNaN(lat) && !isNaN(lng)) {
                    var rawStatus = (row['Status'] || "").toUpperCase();
                    var deviceType = row['DEVICE TYPE'] ? row['DEVICE TYPE'].toUpperCase() : "";
                    var sensorName = row['LIST OF INSTRUMENT'];
                    
                    var showMarker = (activeFilter === 'ALL') || deviceType.includes(activeFilter);

                    if (showMarker) {
                        counts.total++;
                        var statusColor = getColor(row['Status']);
                        
                        if (rawStatus.includes('UP')) counts.up++;
                        else if (rawStatus.includes('DOWN')) counts.down++;
                        else if (rawStatus.includes('MAINTENANCE')) counts.maint++;
                        else if (rawStatus.includes('RELOCATION')) counts.reloc++;
                        if (deviceType.includes('FEWS')) counts.fews++;

                        // Draw 10km Buffer for ARG/TANDEM (Ignores RELOCATION)
                        if ((deviceType.includes('ARG') || deviceType.includes('TANDEM')) && !rawStatus.includes('RELOCATION')) {
                            L.circle([lat, lng], {
                                radius: 10000, 
                                color: '#0ea5e9', 
                                weight: 1, 
                                opacity: 0.3, 
                                fillColor: '#0ea5e9',
                                fillOpacity: 0.05, 
                                interactive: false 
                            }).addTo(ewsBuffers);
                        }

                        // Store WLMS and TANDEM points for the Flow Animation Engine
                        if ((deviceType.includes('WLMS') || deviceType.includes('TANDEM')) && !rawStatus.includes('RELOCATION')) {
                            wlmsNodesMap.push(L.latLng(lat, lng));
                        }

                        var metricsHtml = "";
                        
                        let mainWl = getMetric(row, 'WATER', 'COLUMN 6');
                        let mainRg = getMetric(row, 'RAIN', 'COLUMN 7');

                        if ((deviceType.includes('WLMS') || deviceType.includes('TANDEM')) && mainWl) {
                            let cleanWl = parseFloat(mainWl);
                            if (!isNaN(cleanWl)) metricsHtml += `<b>Water Level:</b> <span style="color:#0284c7; font-weight:800;">${cleanWl} m</span><br>`;
                        }
                        if ((deviceType.includes('ARG') || deviceType.includes('TANDEM')) && mainRg) {
                            let cleanRg = parseFloat(mainRg);
                            if (!isNaN(cleanRg)) metricsHtml += `<b>Rainfall:</b> <span style="color:#0ea5e9; font-weight:800;">${cleanRg} mm</span><br>`;
                        }

                        var historyHtml = "";
                        if (archivedHistoryMap[sensorName] && archivedHistoryMap[sensorName].length > 0) {
                            historyHtml = `
                                <div class="history-container">
                                    <div class="history-title">
                                        <i class="fa-solid fa-clock-rotate-left"></i> Past 24 Hours Timeline
                                    </div>
                                    <div class="history-log">
                                        ${archivedHistoryMap[sensorName].join('')}
                                    </div>
                                </div>
                            `;
                        }

                        var isFews = deviceType.includes('FEWS');
                        var iconHtml = isFews 
                            ? `<div style="font-size: 16px; line-height: 1; margin-top: -1px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5));">🚨</div>`
                            : (deviceType.includes('TANDEM') ? `<i class="fa-solid fa-cloud-showers-water" style="font-size: 12px;"></i>` 
                            : (deviceType.includes('WLMS') ? `<i class="fa-solid fa-water" style="font-size: 12px;"></i>` 
                            : (deviceType.includes('ARG') ? `<i class="fa-solid fa-cloud-rain" style="font-size: 12px;"></i>` 
                            : `<i class="fa-solid fa-satellite-dish" style="font-size: 12px;"></i>`)));

                        var markerSize = isFews ? 30 : 26;
                        var pulseClass = isFews ? 'marker-fews' : '';

                        var customIcon = L.divIcon({
                            html: `<div class="map-marker ${pulseClass}" style="background-color: ${statusColor}; width: ${markerSize}px; height: ${markerSize}px;">${iconHtml}</div>`,
                            className: 'custom-leaflet-icon',
                            iconSize: [markerSize, markerSize],
                            iconAnchor: [markerSize / 2, markerSize / 2]
                        });

                        var marker = L.marker([lat, lng], { icon: customIcon });

                        // Add raw text to popup so we can identify it later during click events
                        marker.bindPopup(`
                            <div style="line-height:1.6; min-width: 180px;" data-devicetype="${deviceType}">
                                <strong style="font-size:11px; text-transform:uppercase; color:#0f172a; display:block; margin-bottom:6px; border-bottom:2px solid #e2e8f0; padding-bottom:4px;">
                                    ${sensorName}
                                </strong>
                                <div style="font-size:12px; color:#334155;">
                                    <span style="color:#64748b; font-size:10px; text-transform:uppercase; font-weight:700;">Type:</span> ${deviceType}<br>
                                    <span style="color:#64748b; font-size:10px; text-transform:uppercase; font-weight:700;">Status:</span> <span style="font-weight:700; color:${statusColor}">${row['Status']}</span><br>
                                    
                                    <div class="gps-box">
                                        <i class="fa-solid fa-location-crosshairs" style="color:#94a3b8;"></i> 
                                        ${lat.toFixed(5)}, ${lng.toFixed(5)}
                                    </div>
                                    ${metricsHtml}
                                </div>
                                
                                ${historyHtml}

                                <div style="margin-top:8px; font-size:9px; color:#94a3b8; text-align:right;">
                                    Updated: ${row['UPDATE:'] || row['TIMESTAMP'] || ''}
                                </div>
                            </div>
                        `).addTo(ewsMarkers);
                    }
                }
            });

            document.getElementById('statTotal').innerText = `${counts.total} Total`;
            document.getElementById('statUp').innerText = counts.up;
            document.getElementById('statDown').innerText = counts.down;
            document.getElementById('statMaint').innerText = counts.maint;
            document.getElementById('statReloc').innerText = counts.reloc;
            document.getElementById('statFews').innerText = counts.fews;

            if (ewsMarkers.getLayers().length > 0 && !window.initialZoomDone) {
                map.fitBounds(ewsMarkers.getBounds(), { padding: [50, 50] });
                window.initialZoomDone = true;
            }
        }

        // ==========================================
        // NEW: The Hydrological Pulse Animation Engine
        // ==========================================
        map.on('popupopen', function(e) {
            ewsFlowLines.clearLayers(); // Clear old lines
            
            // Check if the opened popup belongs to a Water Level sensor
            var popupContent = e.popup.getContent();
            if (popupContent.includes('data-devicetype="WLMS"') || popupContent.includes('data-devicetype="TANDEM"')) {
                var origin = e.popup.getLatLng();
                var distances = [];

                // Calculate distance to all other WLMS nodes
                wlmsNodesMap.forEach(function(node) {
                    var d = origin.distanceTo(node);
                    if (d > 0) { // Don't connect to itself
                        distances.push({ node: node, dist: d });
                    }
                });

                // Sort by nearest
                distances.sort((a, b) => a.dist - b.dist);
                
                // Connect an animated line to the 2 nearest water sensors
                var nearest = distances.slice(0, 2);
                nearest.forEach(function(target) {
                    L.polyline([origin, target.node], {
                        color: '#0ea5e9',
                        weight: 4,
                        opacity: 0.8,
                        className: 'water-flow-line', // Triggers the CSS animation
                        interactive: false // So it doesn't block mouse clicks
                    }).addTo(ewsFlowLines);
                });
            }
        });

        // Hide the animated lines when the popup is closed
        map.on('popupclose', function() {
            ewsFlowLines.clearLayers();
        });

    </script>
</body>
</html>
